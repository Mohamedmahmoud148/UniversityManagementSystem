theme: jekyll-theme-cayman
title: "University Management System"
description: "AI-Powered University ERP Platform — ASP.NET Core 9 · FastAPI · PostgreSQL · SignalR"
url: "https://mohamedmahmoud148.github.io"
baseurl: "/UniversityManagementSystem"

# Jekyll settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Include all markdown files in subdirectories
include:
  - "Project-Documentation"

# Exclude non-doc files from Pages build
exclude:
  - "UniversityManagementSystem.Api/"
  - "UniversityManagementSystem.Core/"
  - "UniversityManagementSystem.Infrastructure/"
  - "UniversityManagementSystem.Tests/"
  - "*.sln"
  - "*.csproj"
  - ".claude/"
  - ".gitignore"
  - "Dockerfile"
  - "docker-compose.yml"
  - "node_modules/"

plugins:
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
