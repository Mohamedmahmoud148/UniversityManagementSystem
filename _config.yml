theme: jekyll-theme-cayman
title: "University Management System"
description: "AI-Powered University ERP Platform — ASP.NET Core 9 · FastAPI · PostgreSQL · SignalR · Hangfire · Claude AI"
url: "https://mohamedmahmoud148.github.io"
baseurl: "/UniversityManagementSystem"

render_with_liquid: false

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# Tell Jekyll to process README.md files as pages
include:
  - "Project-Documentation"

exclude:
  - "Project-Documentation/32-React-Frontend/"
  - "Project-Documentation/FRONTEND_INTEGRATION_REPORT.md"
  - "UniversityManagementSystem.Api/"
  - "UniversityManagementSystem.Core/"
  - "UniversityManagementSystem.Infrastructure/"
  - "UniversityManagementSystem.Tests/"
  - "*.sln"
  - ".claude/"
  - ".gitignore"
  - "Dockerfile"
  - "node_modules/"
  - "app/"
  - "requirements.txt"
